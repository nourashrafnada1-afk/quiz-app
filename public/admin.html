<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Admin Panel</h1>

<button id="startQuiz">Start Quiz</button>

<h2>Users:</h2>
<ul id="usersList"></ul>

<h2>Top 3:</h2>
<ol id="topList"></ol>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const startBtn = document.getElementById("startQuiz");
const usersList = document.getElementById("usersList");
const topList = document.getElementById("topList");

// بدء الكويز
startBtn.onclick = () => {
  socket.emit("startQuiz");
};

// تحديث بيانات المستخدمين والـ Top 3
socket.on("updateAdmin", (users) => {
  // قائمة كل المستخدمين
  usersList.innerHTML = "";
  Object.values(users).forEach(u => {
    const li = document.createElement("li");
    li.textContent = `${u.name} - Total: ${u.total}`;
    usersList.appendChild(li);
  });

  // تحديث Top 3
  const sorted = Object.values(users).sort((a,b)=>b.total - a.total);
  topList.innerHTML = "";
  sorted.slice(0,3).forEach(u=>{
    const li = document.createElement("li");
    li.textContent = `${u.name} - ${u.total}`;
    topList.appendChild(li);
  });
});
</script>

</body>
</html>
